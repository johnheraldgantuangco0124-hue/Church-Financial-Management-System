<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Deposit to Bank | ChurchSys</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>body { background-color: #f8f9fa; font-family: sans-serif; }</style>
</head>
<body>
    <div class="container mt-5" style="max-width: 600px;">
        <div class="card shadow border-0">
            <div class="card-header bg-success text-white p-4">
                <h4 class="mb-0"><i class="bi bi-arrow-right-circle me-2"></i> Deposit Cash to Bank</h4>
                <small>Transfer money from Physical Cash to Bank Account</small>
            </div>
            <div class="card-body p-4">

                <div class="alert alert-light border d-flex align-items-center mb-4">
                    <i class="bi bi-cash-stack fs-3 text-success me-3"></i>
                    <div>
                        <small class="text-muted text-uppercase fw-bold">Current Physical Cash</small>
                        <h4 class="mb-0 fw-bold">₱ {{ cash_on_hand|floatformat:2 }}</h4>
                    </div>
                </div>

                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label fw-bold">Amount to Deposit</label>
                        <div class="input-group">
                            <span class="input-group-text">₱</span>
                            {{ form.amount }}
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Date of Deposit</label>
                        {{ form.deposit_date }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Deposit Slip / Proof</label>
                        {{ form.proof_image }}
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Notes</label>
                        {{ form.notes }}
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{% url 'financial_overview' %}" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-success px-4 fw-bold">Confirm Deposit</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
