<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Donation Status</title>
</head>
<body>
    <h2>Your Donation Status</h2>

    <table>
        <thead>
            <tr>
                <th>Amount</th>
                <th>Donation Type</th>
                <th>Donation Date</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            {% for donation in donations %}
                <tr>
                    <td>{{ donation.amount }}</td>
                    <td>{{ donation.donation_type }}</td>
                    <td>{{ donation.donation_date }}</td>
                    <td>{{ donation.status }}</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>

    <a href="{% url 'add_online_donations' %}">Submit Another Donation</a>
</body>
</html>
