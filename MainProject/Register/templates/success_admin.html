<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Successful</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
{% include 'Admin_navbar.html' %}
<div class="container mt-5">
    <div class="card text-center">
        <div class="card-header bg-success text-white">
            <h1>Registration Successful</h1>
        </div>
        <div class="card-body">
            <h5 class="card-title">Thank you for registering!</h5>
            <p class="card-text">You can now log in or explore further.</p>
            <a href="{% url 'login' %}" class="btn btn-primary">Go to Login</a>
            <a href="/" class="btn btn-secondary">Return to Home</a>

            <!-- Logout Button -->
            {% if user.is_authenticated %}
                <form method="post" action="{% url 'landing' %}" style="display: inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Logout</button>
                </form>
            {% endif %}
        </div>
        <div class="card-footer text-muted">
            Church Information System
        </div>
    </div>
</div>
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
  <footer class="container mt-5 text-center">
        <p>Living Stone Evangelical Free Church Information System</p>
    </footer>
</html>
