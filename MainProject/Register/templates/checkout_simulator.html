<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Secure Checkout</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <style>
    body{background:#0b1220;color:#e6eefc;}
    .wrap{max-width:700px;margin:40px auto;padding:0 16px}
    .card{background:#121a2b;border:1px solid #22304c;border-radius:16px;}
    .btn-primary{background:#7dd3fc;border-color:#7dd3fc;color:#05243a;font-weight:700}
    .text-muted{color:#9fb3c8 !important}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="card-body">
        <h4 class="mb-1">Secure Checkout</h4>
        <div class="text-muted mb-3">{{ intent.channel }} via {{ intent.giving_type }}</div>

        <div class="row">
          <div class="col-md-6">
            <div class="border rounded p-3 mb-3">
              <div class="small text-muted">Amount</div>
              <div class="h4 mb-0">₱{{ intent.amount }}</div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="border rounded p-3 mb-3">
              <div class="small text-muted">Fund</div>
              <div class="h5 mb-0">{{ intent.fund|default:"—" }}</div>
            </div>
          </div>
        </div>

        <p class="small text-muted">For demo, press “Verify OTP & Pay”. (In production, users complete OTP/3-D Secure on the gateway’s page.)</p>

        <form method="post">
          {% csrf_token %}
          <button class="btn btn-primary btn-block" type="submit">Verify OTP &amp; Pay</button>
          <a class="btn btn-outline-light btn-block" href="{% url 'online_giving' %}">Back</a>
        </form>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
