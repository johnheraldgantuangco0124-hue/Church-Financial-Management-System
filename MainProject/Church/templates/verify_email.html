{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { border: none; box-shadow: 0 10px 20px rgba(0,0,0,0.1); border-radius: 15px; }
        .otp-input { letter-spacing: 5px; font-size: 1.5rem; text-align: center; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card p-4 text-center" style="max-width: 400px; width: 100%;">
        <div class="mb-3">
            <i class="fas fa-envelope-open-text fa-3x text-primary"></i>
        </div>
        <h3>Verify Email</h3>
        <p class="text-muted small">
            We sent a 6-digit code to your email.<br>
            Please enter it below to activate your account.
        </p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} py-2 small">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <input type="text" name="code" class="form-control form-control-lg otp-input"
                       placeholder="123456" maxlength="6" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">Verify Account</button>
        </form>

        <div class="mt-3 text-muted small">
            Didn't receive it? <a href="#" onclick="history.back()">Try registering again</a>
        </div>
    </div>
</body>
</html>
